/* ===== Design Tokens ===== */
:root {
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-primary-light: #dbeafe;
  --color-secondary: #64748b;
  --color-success: #16a34a;
  --color-danger: #dc2626;
  --color-bg: #f8fafc;
  --color-bg-white: #ffffff;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-muted: #94a3b8;
  --color-border: #e2e8f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, 'SFMono-Regular', monospace;
}

/* ===== Reset ===== */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}
html {
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh;
  background: var(--color-bg);
  color: var(--color-text-primary);
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
ul, ol { list-style: none; }

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-bg-white);
  border-bottom: 1px solid var(--color-border);
}
.header__inner {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 1280px; margin: 0 auto; padding: 16px 32px;
}
.header__logo {
  font-size: 20px; font-weight: 700; color: var(--color-text-primary);
  display: flex; align-items: center; gap: 8px;
}
.header__logo-icon {
  width: 32px; height: 32px;
  background: var(--color-primary); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px;
}
.header__nav { display: flex; align-items: center; gap: 12px; }
.header__link { font-size: 14px; color: var(--color-text-secondary); padding: 8px 12px; border-radius: var(--radius-sm); }
.header__link:hover { background: var(--color-bg); color: var(--color-text-primary); }
.header__link--active { color: var(--color-primary); font-weight: 500; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; cursor: pointer;
  border: none; transition: all 0.15s;
}
.btn--primary { background: var(--color-primary); color: white; }
.btn--primary:hover { background: var(--color-primary-hover); }
.btn--secondary { background: var(--color-bg); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
.btn--secondary:hover { border-color: var(--color-primary); color: var(--color-primary); }
.btn--sm { padding: 6px 12px; font-size: 13px; }
.btn--lg { padding: 14px 32px; font-size: 16px; }

/* ===== Admin Layout ===== */
.admin { display: flex; min-height: calc(100vh - 73px); }
.admin__sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--color-bg-white);
  border-right: 1px solid var(--color-border);
  padding: 24px 0;
}
.admin__sidebar-title {
  padding: 0 20px; margin-bottom: 16px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--color-text-muted);
}
.admin__nav { display: flex; flex-direction: column; gap: 2px; }
.admin__nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; font-size: 14px;
  color: var(--color-text-secondary); cursor: pointer;
  transition: all 0.15s; text-align: left; width: 100%;
}
.admin__nav-item:hover { background: var(--color-bg); color: var(--color-text-primary); }
.admin__nav-item--active { background: var(--color-primary); color: white; font-weight: 500; }
.admin__nav-item--active:hover { background: var(--color-primary-hover); color: white; }
.admin__nav-icon { font-size: 16px; width: 20px; text-align: center; }
.admin__content { flex: 1; padding: 32px; overflow-x: auto; }

/* ===== Overview ===== */
.admin__overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
.admin__stat-card {
  background: var(--color-bg-white); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 20px;
}
.admin__stat-label { font-size: 13px; color: var(--color-text-muted); margin-bottom: 4px; }
.admin__stat-value { font-size: 28px; font-weight: 700; color: var(--color-text-primary); }
.admin__stat-delta { font-size: 12px; margin-top: 4px; }
.admin__stat-delta--up { color: var(--color-success); }
.admin__stat-delta--down { color: var(--color-danger); }

/* ===== Section ===== */
.admin__section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.admin__section-title { font-size: 20px; font-weight: 600; }
.admin__section-actions { display: flex; gap: 8px; }

/* ===== Table ===== */
.admin__table-wrap {
  background: var(--color-bg-white); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); overflow-x: auto;
}
.admin__table { width: 100%; border-collapse: collapse; min-width: 700px; }
.admin__table th {
  text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.3px; color: var(--color-text-muted);
  background: var(--color-bg); padding: 10px 16px;
  border-bottom: 1px solid var(--color-border);
}
.admin__table td {
  font-size: 14px; color: var(--color-text-primary);
  padding: 12px 16px; border-bottom: 1px solid var(--color-border);
}
.admin__table tr:last-child td { border-bottom: none; }
.admin__table tr:hover td { background: var(--color-bg); }

/* ===== Badges ===== */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.badge--active { background: #e6f7e6; color: #1a7d1a; }
.badge--blocked { background: #fde8e8; color: #c41e1e; }
.badge--completed { background: #e6f7e6; color: #1a7d1a; }
.badge--error { background: #fde8e8; color: #c41e1e; }
.badge--pending { background: #fff7e6; color: #b8860b; }
.badge--free { background: #f5f5f5; color: #666; }
.badge--start { background: #e3f2fd; color: #1565c0; }
.badge--pro { background: #ede7f6; color: #5e35b1; }
.badge--business { background: #e8f5e9; color: #2e7d32; }
.badge--info { background: #e3f2fd; color: #1565c0; }
.badge--warn { background: #fff7e6; color: #b8860b; }

/* ===== Actions ===== */
.actions { display: flex; gap: 6px; }
.action-btn {
  padding: 4px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); background: var(--color-bg-white);
  color: var(--color-text-secondary); font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.action-btn--danger:hover { border-color: var(--color-danger); color: var(--color-danger); }

/* ===== Plans ===== */
.admin__plans { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.admin__plan-card {
  background: var(--color-bg-white); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 20px;
}
.admin__plan-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.admin__plan-price { font-size: 24px; font-weight: 700; color: var(--color-primary); margin-bottom: 12px; }
.admin__plan-field { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--color-border); }
.admin__plan-field:last-child { border-bottom: none; }
.admin__plan-field-label { color: var(--color-text-muted); }
.admin__plan-field-value { color: var(--color-text-primary); font-weight: 500; }

/* ===== Templates ===== */
.admin__templates { display: grid; grid-template-columns: repeat(5,1fr); gap: 16px; }
.admin__template-card {
  background: var(--color-bg-white); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 20px; text-align: center;
  transition: box-shadow 0.2s; cursor: default;
}
.admin__template-card:hover { box-shadow: var(--shadow-md); }
.admin__template-preview {
  width: 100%; height: 100px; background: var(--color-bg);
  border-radius: var(--radius-sm); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 36px;
}
.admin__template-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.admin__template-type { font-size: 12px; color: var(--color-text-muted); margin-bottom: 10px; }

/* ===== Logs ===== */
.admin__log-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--color-border);
  font-size: 13px;
}
.admin__log-item:last-child { border-bottom: none; }
.log-time {
  flex-shrink: 0; color: var(--color-text-muted);
  font-family: var(--font-mono); font-size: 12px; width: 150px;
}
.log-msg { color: var(--color-text-primary); flex: 1; }

/* ===== Footer ===== */
.footer {
  background: var(--color-bg-white); border-top: 1px solid var(--color-border);
  padding: 24px 0; margin-top: auto;
}
.footer__inner {
  max-width: 1280px; margin: 0 auto; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; color: var(--color-text-muted);
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
  .admin__overview { grid-template-columns: repeat(2,1fr); }
  .admin__plans { grid-template-columns: repeat(2,1fr); }
  .admin__templates { grid-template-columns: repeat(3,1fr); }
}
@media (max-width: 768px) {
  .admin { flex-direction: column; }
  .admin__sidebar {
    width: 100%; border-right: none; border-bottom: 1px solid var(--color-border); padding: 12px 0;
  }
  .admin__nav { flex-direction: row; overflow-x: auto; padding: 0 16px; }
  .admin__nav-item { white-space: nowrap; padding: 8px 14px; }
  .admin__content { padding: 16px; }
  .admin__overview, .admin__plans { grid-template-columns: 1fr; }
  .admin__templates { grid-template-columns: repeat(2,1fr); }
  .header__inner { padding: 12px 16px; }
  .footer__inner { padding: 0 16px; flex-direction: column; gap: 8px; text-align: center; }
}
</style>

              <td><span class="badge badge--${u.status}">${u.status === 'active' ? 'Активен' : 'Заблокирован'}</span></td>
              <td><div class="actions"><button class="action-btn">✏️</button><button class="action-btn action-btn--danger">${u.status === 'active' ? '🚫' : '✅'}</button></div></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderPresentations() {
  return `
    <div class="admin__section-header">
      <h2 class="admin__section-title">Презентации</h2>
      <button class="btn btn--sm btn--secondary">Экспорт CSV</button>
    </div>
    <div class="admin__table-wrap">
      <table class="admin__table">
        <thead><tr>
          <th>ID</th><th>Название</th><th>Пользователь</th><th>Тип</th><th>Слайды</th><th>Статус</th><th>Создана</th><th>Действия</th>
        </tr></thead>
        <tbody>
          ${DATA.presentations.map(p => `
            <tr>
              <td style="font-family:var(--font-mono);font-size:13px">#${p.id}</td>
              <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</td>
              <td>${p.user}</td>
              <td><span class="badge badge--info">${TYPE_LABELS[p.type] || p.type}</span></td>
              <td>${p.slides}</td>
              <td><span class="badge badge--${p.status}">${p.status === 'completed' ? 'Готово' : p.status === 'error' ? 'Ошибка' : 'В обработке'}</span></td>
              <td style="font-size:13px">${p.created}</td>
              <td><div class="actions"><button class="action-btn">👁️</button><button class="action-btn action-btn--danger">🗑️</button></div></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderPlans() {
  return `
    <div class="admin__section-header">
      <h2 class="admin__section-title">Тарифы</h2>
      <button class="btn btn--sm btn--primary">Создать тариф</button>
    </div>
    <div class="admin__plans">
      ${DATA.plans.map(pl => `
        <div class="admin__plan-card">
          <div class="admin__plan-name">${pl.name}</div>
          <div class="admin__plan-price">${pl.price}</div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Презентаций</span><span class="admin__plan-field-value">${pl.pres}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Слайдов</span><span class="admin__plan-field-value">${pl.slides}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">PPTX</span><span class="admin__plan-field-value">${pl.pptx}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">PDF</span><span class="admin__plan-field-value">${pl.pdf}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Водяной знак</span><span class="admin__plan-field-value">${pl.wm}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Брендбук</span><span class="admin__plan-field-value">${pl.brand}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Excel</span><span class="admin__plan-field-value">${pl.excel}</span></div>
          <div class="admin__plan-field"><span class="admin__plan-field-label">Заметки спикера</span><span class="admin__plan-field-value">${pl.notes}</span></div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTemplates() {
  return `
    <div class="admin__section-header">
      <h2 class="admin__section-title">Шаблоны оформления</h2>
      <button class="btn btn--sm btn--primary">+ Загрузить шаблон</button>
    </div>
    <div class="admin__templates">
      ${DATA.templates.map(t => `
        <div class="admin__template-card">
          <div class="admin__template-preview">${t.icon}</div>
          <div class="admin__template-name">${t.name}</div>
          <div class="admin__template-type">${TYPE_LABELS[t.type] || t.type}</div>
          <div class="actions" style="justify-content:center"><button class="action-btn">✏️ Ред.</button><button class="action-btn action-btn--danger">🗑️</button></div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderLogs() {
  return `
    <div class="admin__section-header">
      <h2 class="admin__section-title">Логи системы</h2>
      <button class="btn btn--sm btn--secondary">Очистить</button>
    </div>
    <div class="admin__table-wrap">
      ${DATA.logs.map(l => `
        <div class="admin__log-item">
          <span class="log-time">${l.time}</span>
          <span class="badge badge--${l.level}">${l.level}</span>
          <span class="log-msg">${l.msg}</span>
        </div>
      `).join('')}
    </div>
  `;
}

const RENDER = { users: renderUsers, presentations: renderPresentations, plans: renderPlans, templates: renderTemplates, logs: renderLogs };

// ===== Navigation =====
function switchSection(section) {
  document.querySelectorAll('.admin__nav-item').forEach(el => {
    el.classList.toggle('admin__nav-item--active', el.dataset.section === section);
  });
  document.getElementById('sectionContent').innerHTML = RENDER[section]();
}

document.getElementById('adminNav').addEventListener('click', e => {
  const btn = e.target.closest('.admin__nav-item');
  if (btn) switchSection(btn.dataset.section);
});

// Init
switchSection('users');
</script>
</body>
</html>
